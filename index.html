<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parthiv Photography</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-image:url("cover.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
height:100vh;
}

.overlay{
width:100%;
height:100vh;
background:rgba(0,0,0,0.45);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.content{
color:#fff;
}

.content h1{
font-size:64px;
margin-bottom:15px;
}

.content p{
font-size:24px;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#ffffff;
color:#000;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#dddddd;
}

@media(max-width:768px){

.content h1{
font-size:42px;
}

.content p{
font-size:18px;
}

}
</style>

</head>

<body>

<div class="overlay">

<div class="content">

<h1>Parthiv Photography</h1>

<p>Capturing Stories Through My Lens</p>

<a href="#" class="btn">View Portfolio</a>

</div>

</div>

</body>
</html>
